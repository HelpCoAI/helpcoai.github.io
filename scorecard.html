<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Is your business leaking leads? | HelpCo AI</title><style>:root{--navy:#1F3B66;--teal:#0fa697;--sun:#f5a623}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:linear-gradient(160deg,#eaf6f4,#eef2f7);color:#1b2a3a}.wrap{max-width:680px;margin:0 auto;padding:24px}h1{font-size:25px;margin:0 0 4px;background:linear-gradient(100deg,var(--teal),var(--sun));-webkit-background-clip:text;background-clip:text;color:transparent}p.sub{color:#5a6b7d;margin:0 0 18px;font-size:14px}.card{background:#fff;border:1px solid #d8e0ea;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 2px 10px rgba(0,0,0,.05)}label.f{display:block;font-weight:800;color:var(--navy);margin:0 0 8px;font-size:15px}input{width:100%;padding:11px;border:1px solid #c7d2de;border-radius:10px;font-size:15px}.qz{font-size:14.5px;font-weight:600;margin:14px 0 6px;color:#1b2a3a}.opts{display:flex;gap:8px}.opts label{flex:1;border:1px solid #c7d2de;border-radius:9px;padding:9px;text-align:center;cursor:pointer;font-size:14px}.opts input{display:none}.opts input:checked+span{font-weight:800;color:var(--teal)}button{background:linear-gradient(100deg,var(--teal),#0c8f82);color:#fff;border:0;border-radius:11px;padding:15px;font-size:16px;font-weight:800;cursor:pointer;width:100%}button:hover{filter:brightness(1.07)}.out{display:none}.big{background:var(--navy);color:#fff;border-radius:14px;padding:20px;text-align:center;margin-bottom:14px}.big .n{font-size:40px;font-weight:800}.cta{background:linear-gradient(100deg,var(--sun),#e6951a);margin-top:8px;display:block;text-align:center;text-decoration:none;color:#fff;border-radius:11px;padding:15px;font-weight:800}.item{background:#f7fafc;border-left:3px solid var(--sun);border-radius:7px;padding:8px 11px;margin:6px 0;font-size:13.5px}small.dis{color:#8595a6;font-size:11.5px;display:block;margin-top:12px}</style></head><body><div class="wrap">
<h1>Is your business leaking leads?</h1><p class="sub">7 quick questions. Find out where customers are slipping away — and get your Lead-Leak score in 60 seconds.</p>
<div class="card" id="quiz"></div>
<button onclick="score()">Get my score →</button>
<div id="out" class="out card" style="margin-top:16px">
<div class="big"><div>Your Lead-Leak Score</div><div class="n" id="grade"></div><div id="pct" style="font-size:14px;opacity:.85"></div></div>
<div id="leaks"></div>
<a class="cta" href="index.html#book">Plug the leaks — book a free demo →</a></div>
<small class="dis">Quick self-assessment, not a guarantee. Book a demo for a real walkthrough.</small></div>
<script>
var Q=["When you miss a call, does the caller automatically get a text back within seconds?","Can customers book you online 24/7 without calling?","Does someone answer your phone after hours and on weekends?","Do you automatically ask every happy customer for a Google review?","Does your website (or Facebook) capture leads when you're closed?","Do you follow up on every quote until they book or say no?","Do you re-contact past customers to rebook them?"];
var qz=document.getElementById('quiz');qz.innerHTML=Q.map(function(q,i){return '<div class="qz">'+(i+1)+'. '+q+'</div><div class="opts"><label><input type="radio" name="q'+i+'" value="1"><span>Yes</span></label><label><input type="radio" name="q'+i+'" value="0" checked><span>No</span></label></div>'}).join('');
function score(){var yes=0;for(var i=0;i<Q.length;i++){var v=document.querySelector('input[name=q'+i+']:checked').value;if(v=='1')yes++;}
var pct=Math.round(yes/Q.length*100);var g=pct>=85?'A':pct>=70?'B':pct>=50?'C':pct>=30?'D':'F';
document.getElementById('grade').textContent=g;document.getElementById('pct').textContent=pct+'% covered \u2014 '+(Q.length-yes)+' leak'+((Q.length-yes)==1?'':'s')+' found';
var leaks=[];for(var i=0;i<Q.length;i++){if(document.querySelector('input[name=q'+i+']:checked').value=='0')leaks.push(Q[i]);}
document.getElementById('leaks').innerHTML=leaks.length?('<b>Where you\u2019re leaking:</b>'+leaks.map(function(l){return '<div class="item">'+l.replace('?','')+'</div>'}).join('')):'<div class="item">Impressive \u2014 you\u2019re covered. We can still automate the busywork.</div>';
document.getElementById('out').style.display='block';document.getElementById('out').scrollIntoView({behavior:'smooth'});}
</script></body></html>
